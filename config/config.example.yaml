# Note: Data source configuration is now managed within the DataDownloader.
# It prioritizes direct API clients (Bitget, Binance, CoinDCX) and falls back to ccxt.

# Database Settings
database:
  database_url: 'sqlite:///crypto_ohlcv.db'
  cleanup_days: 365

# Strategy Parameters
# Each strategy should have its own section
strategies:
  rsi:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30

# Risk Management (to be used by the execution layer later)
risk:
  max_risk_per_trade: 0.02 # 2% of account balance
  max_positions: 1
